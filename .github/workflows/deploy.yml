name: Deploy CipherLens to Azure VM

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ghcr.io/eisendev/cipherlens-backend
  IMAGE_NAME_FRONTEND: ghcr.io/eisendev/cipherlens-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to the Container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_NAME_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=/api
          tags: ${{ env.IMAGE_NAME_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up SSH key and deploy to Azure VM
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VM_IP: 20.6.32.235
          VM_USER: azureuser
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          VITE_API_URL: /api
        run: |
          # Setup SSH Agent
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $VM_IP >> ~/.ssh/known_hosts

          # Copy docker-compose config to the server
          ssh -i ~/.ssh/id_rsa $VM_USER@$VM_IP "mkdir -p /app/cipherlens"
          scp -i ~/.ssh/id_rsa infrastructure/docker-compose.prod.yml $VM_USER@$VM_IP:/app/cipherlens/docker-compose.yml

          # Run deployment commands on the VM
          ssh -i ~/.ssh/id_rsa $VM_USER@$VM_IP "bash -s" << EOF
            cd /app/cipherlens
            
            # Login to GitHub Packages inside VM
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Create or update production .env
            cat << ENVEOF > .env
            DATABASE_URL="$DATABASE_URL"
            GEMINI_API_KEY="$GEMINI_API_KEY"
            JWT_SECRET="$JWT_SECRET"
            JWT_ACCESS_SECRET="$JWT_ACCESS_SECRET"
            JWT_REFRESH_SECRET="$JWT_REFRESH_SECRET"
            VITE_API_URL="$VITE_API_URL"
            BACKEND_IMAGE=${{ env.IMAGE_NAME_BACKEND }}:latest
            FRONTEND_IMAGE=${{ env.IMAGE_NAME_FRONTEND }}:latest
            ENVEOF

            # Pull latest images and spin them up
            docker compose pull
            docker compose up -d --remove-orphans
          EOF
