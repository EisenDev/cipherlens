version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cipherlens-db
    restart: always
    environment:
      POSTGRES_USER: cipherlens_user
      POSTGRES_PASSWORD: cipherlens_secure_password_123
      POSTGRES_DB: cipherlens
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cipherlens_user -d cipherlens"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cipherlens-cache
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
